<!DOCTYPE html>
<html lang="PT-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <title>CRUD</title>
  </head>
  <body>
    <header class="p-3 text-bg-dark">
      <div class="container">
        <div
          class="d-flex flex-wrap align-items-center justify-content-center justify-content-lg-start"
        >
          <a
            href="/"
            class="d-flex align-items-center mb-2 mb-lg-0 text-white text-decoration-none"
          >
            <svg
              class="bi me-2"
              width="40"
              height="32"
              role="img"
              aria-label="Bootstrap"
            >
              <use xlink:href="#bootstrap"></use>
            </svg>
          </a>
          <ul
            class="nav col-12 col-lg-auto me-lg-auto mb-2 justify-content-center mb-md-0"
          >
            <li><a href="#" class="nav-link px-2 text-secondary">Home</a></li>
            <li><a href="#" class="nav-link px-2 text-white">Features</a></li>
            <li><a href="#" class="nav-link px-2 text-white">Pricing</a></li>
            <li><a href="#" class="nav-link px-2 text-white">FAQs</a></li>
            <li><a href="#" class="nav-link px-2 text-white">About</a></li>
          </ul>
          <form class="col-12 col-lg-auto mb-3 mb-lg-0 me-lg-3" role="search">
            <input
              type="search"
              class="form-control form-control-dark text-bg-dark"
              placeholder="Search..."
              aria-label="Search"
            />
          </form>
          <div class="text-end">
            <button type="button" class="btn btn-outline-light me-2">
              Login
            </button>
            <button type="button" class="btn btn-warning">Sign-up</button>
          </div>
        </div>
      </div>
    </header>

    <main>
      <div class="row g-5">
        <div class="col-md-5 col-lg-4 order-md-last">
          <h4 class="d-flex justify-content-between align-items-center mb-3">
           Alunos cadastrados
          </h4>
          <ul class="list-group mb-3">
            <li class="list-group-item d-flex justify-content-between lh-sm">
              <div>
                
              </div>
              <span class="text-body-secondary"></span>
            </li>
            <li class="list-group-item d-flex justify-content-between lh-sm">
              <div>
                
              </div>
              <span class="text-body-secondary"></span>
            </li>
            <li class="list-group-item d-flex justify-content-between lh-sm">
              <div>
                
              </div>
              <span class="text-body-secondary"></span>
            </li>
            <li
              class="list-group-item d-flex justify-content-between bg-body-tertiary"
            >
              <div class="text-success">
                
              </div>
              <span class="text-success"></span>
            </li>
            <li class="list-group-item d-flex justify-content-between">
              
            </li>
          </ul>
          
        </div>
        <div class="col-md-7 col-lg-8">
          <h4 class="mb-3">Cadastro de Alunos</h4>
          <form class="needs-validation" novalidate="">
            <div class="row g-3">

              <div class="col-sm-6">
                <label for="Nome" class="form-label"><strong>Nome</strong></label>
                <input
                  type="text"
                  class="form-control"
                  id="Nome"
                  placeholder=""
                  value=""
                  required=""
                />
                <div class="invalid-feedback">
                  Verifique se o nome esta correto.
                </div>
              </div>
              
              
              <div class="col-12">
                <label for="Idade" class="form-label"><strong>Idade</strong></label>
                <input
                  type="number"
                  class="form-control"
                  id="Idade"
                  placeholder=""
                  required=""
                />
                <div class="invalid-feedback">
                  Por favor, verifique se a idade esta correta.
                </div>
              </div>
              
              <div class="col-12">
                <label for="Cursos" class="form-label"><strong>Cursos</strong></label>
                <input
                  type="text"
                  class="form-control"
                  id="Cursos"
                  placeholder=""
                  required=""
                />
                <div class="invalid-feedback">
                  Por favor, verifique se os cursos estao validos.
                </div>
              </div>

              <div class="col-12">
                <label for="Idade" class="form-label"><strong>Matricula</strong></label>
                <input
                  type="number"
                  class="form-control"
                  id="Matricula"
                  placeholder=""
                  required=""
                />
                <div class="invalid-feedback">
                  Por favor, verifique se a idade esta correta.
                </div>
              </div>
              
            <hr class="my-4" />
            <button class="w-100 btn btn-primary btn-lg" type="submit">
              Cadastrar Aluno
            </button>
          </form>
        </div>
      </div>
    </main>

    <footer
      class="d-flex flex-wrap justify-content-between align-items-center py-3 my-4 border-top"
    >
      <div class="col-md-4 d-flex align-items-center">
        <a
          href="/"
          class="mb-3 me-2 mb-md-0 text-body-secondary text-decoration-none lh-1"
          aria-label="Bootstrap"
        >
          <svg class="bi" width="30" height="24" aria-hidden="true">
            <use xlink:href="#bootstrap"></use>
          </svg>
        </a>
        <span class="mb-3 mb-md-0 text-body-secondary"
          >© 2025 Company, Inc</span
        >
      </div>
      <ul class="nav col-md-4 justify-content-end list-unstyled d-flex">
        <li class="ms-3">
          <a class="text-body-secondary" href="#" aria-label="Instagram"
            ><svg class="bi" width="24" height="24" aria-hidden="true">
              <use xlink:href="#instagram"></use></svg></a>
        </li>
        <li class="ms-3">
          <a class="text-body-secondary" href="#" aria-label="Facebook"
            ><svg class="bi" width="24" height="24">
              <use xlink:href="#facebook"></use></svg></a>
        </li>
      </ul>
    </footer>

    <script src="./js/srcipt.js"></script>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
