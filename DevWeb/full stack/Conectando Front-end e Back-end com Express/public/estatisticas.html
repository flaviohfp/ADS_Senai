<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Estatísticas de Usuários</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css"
    />
    <link rel="stylesheet" href="/css/style.css" />
    <style>
      .stats-hero {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 3rem 0;
        text-align: center;
        border-radius: 20px;
        margin-bottom: 2rem;
      }
    </style>
  </head>
  <body>
    <div class="container mt-5">
      <div class="d-flex justify-content-between align-items-center mb-5">
        
        <h1 class="mb-0"><i class="bi bi-bar-chart-line"></i> Estatísticas</h1>
        <div></div>
      </div>

      <div class="stats-hero">
        <h2 class="display-4 mb-3"><i class="bi bi-graph-up-arrow"></i> Visão Geral</h2>
        <p class="lead">Estatísticas dos usuários cadastrados</p>
      </div>

      <div id="mensagem" class="alert text-center mb-4" style="display: none"></div>
      
      <div id="container-estatisticas">
        <!-- Estatísticas renderizadas pelo JS -->
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/estatisticas.js"></script>
  </body>
</html>
